<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marea — Личный кабинет</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --bg: #F6F3EE;
    --white: #FFFFFF;
    --dark: #18160F;
    --muted: #8A867C;
    --accent: #C05C35;
    --accent-hover: #A84A26;
    --accent-soft: #F2E5DE;
    --border: #E3DDD5;
    --chip-bg: #EEEBE5;
    --red: #D03A3A;
}

body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

nav {
    background: rgba(246,243,238,.93);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
}

.nav-wrap {
    max-width: 1280px; margin: 0 auto; padding: 0 40px;
    height: 66px; display: flex; align-items: center; gap: 28px;
}

.logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--dark);
    text-decoration: none;
}

.logo .dot { color: var(--accent); }

.nav-links { display: flex; gap: 22px; margin-left: auto; align-items: center; }
.nav-links a { font-size: 14px; color: var(--muted); text-decoration: none; transition: color .2s; }
.nav-links a:hover { color: var(--dark); }

.profile-badge {
    background: var(--dark);
    color: #fff;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    text-decoration: none;
}

.account-page {
    flex: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px;
    width: 100%;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 32px;
    animation: fadeUp .4s ease both;
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
}

.sidebar {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 24px;
    height: fit-content;
}

.user-card {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
}

.user-avatar-wrapper {
    position: relative;
}

.user-avatar {
    width: 56px; height: 56px;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 600; font-family: 'Playfair Display', serif;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.user-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
}

.avatar-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
}

.user-avatar:hover .avatar-overlay { opacity: 1; }

.user-info h3 { font-size: 16px; font-weight: 600; margin-bottom: 4px; color: var(--dark); }
.user-info p { font-size: 13px; color: var(--muted); }

.menu {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.menu-item {
    padding: 12px 16px;
    border-radius: 12px;
    color: var(--dark);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: background .2s, color .2s;
    display: flex;
    align-items: center;
    gap: 12px;
}

.menu-item:hover { background: var(--chip-bg); }
.menu-item.active { background: var(--dark); color: #fff; }
.menu-item.danger { color: var(--red); margin-top: 16px; }
.menu-item.danger:hover { background: rgba(208, 58, 58, 0.1); }

.content-box {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 32px 40px; /* Уменьшено (было 44px 48px) */
    box-shadow: 0 8px 40px rgba(0,0,0,.04);
    height: fit-content;
}

.content-header {
    margin-bottom: 24px; /* Уменьшено (было 32px) */
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    margin-bottom: 6px;
}

.subtitle { font-size: 14px; color: var(--muted); line-height: 1.6; }

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 20px; /* Уменьшен вертикальный отступ между строками (было 20px) */
}

.field { margin-bottom: 8px; } /* Уменьшено (было 20px) */
.field.full { grid-column: 1 / -1; }

.field label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 13px; font-weight: 500; margin-bottom: 6px;
}

.field input {
    width: 100%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: inherit; font-size: 14px; color: var(--dark);
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
}

.field input:focus {
    border-color: var(--accent); background: #fff;
    box-shadow: 0 0 0 3px rgba(192,92,53,.08);
}

.field input::placeholder { color: var(--muted); }

.actions {
    display: flex;
    justify-content: flex-end;
    gap: 12px;
    margin-top: 24px; /* Уменьшено (было 32px) */
    padding-top: 24px; /* Уменьшено (было 32px) */
    border-top: 1px solid var(--border);
}

.btn-submit {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px 28px;
    font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: background .2s;
}

 .btn-submit:hover { background: var(--accent-hover); }

.toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--dark);
    color: #fff;
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.3s ease;
    pointer-events: none;
}

.toast.show { opacity: 1; transform: translateY(0); }

</style>

</head>
<body>

<nav>
  <div class="nav-wrap">
    <a href="/" class="logo">Mare<span class="dot">a</span></a>

    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="http://127.0.0.1:8000/catalog">Каталог</a>
      <a href="http://127.0.0.1:8000/actions">Акции</a>
      <a href="http://127.0.0.1:8000/sell">Продавать</a>
      <a href="#" class="profile-badge">АИ</a>
    </div>

  </div>
</nav>

<div class="account-page">
  <aside class="sidebar">
    <div class="user-card">

      <div class="user-avatar-wrapper">
        <label for="avatar-upload" class="user-avatar">
          <span id="avatar-text">АИ</span>
          <img id="avatar-img" src="" alt="Avatar" style="display: none;">

          <div class="avatar-overlay">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
          </div>

        </label>
        <input type="file" id="avatar-upload" accept="image/*" hidden onchange="loadAvatar(event)">
      </div>

      <div class="user-info">
        <h3 id="profile-username"></h3>
        <p id="profile-email"></p>
      </div>
    </div>

    <nav class="menu">
      <a href="#" class="menu-item active">👤 Личные данные</a>
      <a href="#" class="menu-item">📦 Мои заказы</a>
      <a href="#" class="menu-item">❤️ Избранное</a>
      <a href="#" class="menu-item">🏷️ Мои товары</a>
      <a href="#" class="menu-item danger" onclick="logout()">🚪 Выйти</a>
    </nav>
  </aside>

  <main class="content-box">

    <div class="content-header">
      <h1>Личные данные</h1>
      <p class="subtitle">Управляйте своей контактной информацией и настройками профиля</p>
    </div>

    <div class="form-grid">

      <div class="field full">
        <label>Email</label>
        <input type="email" value="alex@example.com" placeholder="Укажите почту">
      </div>

      <div class="field">
        <label>Телефон</label>
        <input type="tel" placeholder="+7 (___) ___-__-__">
      </div>

      <div class="field">
        <label>Город</label>
        <input type="text" value="Москва" placeholder="Ваш город">
      </div>

    </div>

    <div class="actions">
      <button class="btn-submit" onclick="saveData(this)">Сохранить изменения</button>
    </div>

  </main>
</div>

<div class="toast" id="toastMsg">✅ Настройки успешно сохранены</div>

<script>

async function loadProfile() {
    const res = await fetch('/auth/me');
    if (!res.ok) { window.location.href = '/login'; return; }

    const data = await res.json();
    const letter = data.user.charAt(0).toUpperCase();

    document.getElementById('avatar-text').textContent = letter;
    document.getElementById('profile-username').textContent = data.user;
    document.getElementById('profile-email').textContent = data.email;

    const badge = document.querySelector('.profile-badge');
    if (badge) badge.textContent = letter;
}

loadProfile();

function loadAvatar(event) {
    const file = event.target.files[0];

    if (file) {
        const reader = new FileReader();

        reader.onload = function(e) {
            const img = document.getElementById('avatar-img');
            const text = document.getElementById('avatar-text');

            img.src = e.target.result;
            img.style.display = 'block';
            text.style.display = 'none';
      }
      reader.readAsDataURL(file);
    }
}

function saveData(btn) {
    const originalText = btn.textContent;
    btn.textContent = 'Сохранение...';
    btn.style.opacity = '0.8';

    setTimeout(() => {
        btn.textContent = originalText;
        btn.style.opacity = '1';

        const toast = document.getElementById('toastMsg');
        toast.classList.add('show');

        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }, 800);
}

async function logout() {
    try {
        const res = await fetch('/auth/logout', {
            method: 'POST'
        });

        if (res.redirected) {
            window.location.href = res.url;
        }

        else {
            window.location.href = "/";
        }
    }

    catch (err) {
        console.error("Logout error:", err);
        window.location.href = "/";
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marea — Вход</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F6F3EE;
    --white: #FFFFFF;
    --dark: #18160F;
    --muted: #8A867C;
    --accent: #C05C35;
    --accent-hover: #A84A26;
    --accent-soft: #F2E5DE;
    --border: #E3DDD5;
    --chip-bg: #EEEBE5;
    --red: #D03A3A;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    background: rgba(246,243,238,.93);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-wrap {
    max-width: 1280px; margin: 0 auto; padding: 0 40px;
    height: 66px; display: flex; align-items: center; gap: 28px;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--dark); text-decoration: none; }
  .logo .dot { color: var(--accent); }
  .nav-links { display: flex; gap: 22px; margin-left: auto; }
  .nav-links a { font-size: 14px; color: var(--muted); text-decoration: none; transition: color .2s; }
  .nav-links a:hover { color: var(--dark); }
  .nav-links a.active { color: var(--dark); font-weight: 500; }

  .page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .form-box {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 44px 48px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 8px 40px rgba(0,0,0,.06);
    animation: fadeUp .4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .field { margin-bottom: 20px; }

  .field label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 7px;
  }

  .field input {
    width: 100%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 14px;
    color: var(--dark);
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }

  .field input:focus {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(192,92,53,.08);
  }

  .field input::placeholder { color: var(--muted); }

  .field input.err { border-color: var(--red); }

  .err-msg {
    font-size: 12px;
    color: var(--red);
    margin-top: 5px;
    display: none;
  }

  .actions {
    display: flex;
    flex-direction: column; /* Вертикальное расположение */
    align-items: center;
    gap: 20px;
    margin-top: 28px;
  }

  .btn-submit {
    width: 100%; /* Кнопка на всю ширину */
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-submit:hover { background: var(--accent-hover); }

  .switch-link {
    font-size: 14px;
    color: var(--muted);
  }
  .switch-link a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
    margin-left: 4px;
    transition: color .2s;
  }
  .switch-link a:hover {
    color: var(--accent-hover);
    text-decoration: underline;
  }

  /* SUCCESS */
  .success {
    text-align: center;
    display: none;
    animation: fadeUp .4s ease both;
  }
  .success-icon { font-size: 60px; margin-bottom: 18px; }
  .success h2 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 500; margin-bottom: 8px; }
  .success p { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .btn-again {
    background: var(--accent-soft);
    color: var(--accent);
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-again:hover { background: #e8d5cc; }
</style>
</head>
<body>

<nav>
  <div class="nav-wrap">
    <a href="/" class="logo">Mare<span class="dot">a</span></a>
    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="#">Каталог</a>
      <a href="#">Акции</a>
      <a href="#">Доставка</a>
      <a href="#" class="active">Вход</a>
    </div>
  </div>
</nav>

<div class="page">
  <div class="form-box">

    <div id="form-view">
      <h1>Вход</h1>
      <p class="subtitle">Введите логин и пароль для доступа к вашему аккаунту</p>

      <div class="field">
        <label>Логин</label>
        <input
          type="text"
          id="login"
          placeholder="Ваш логин"
          oninput="clearErr('login')"
        >
        <div class="err-msg" id="login-err">Пожалуйста, введите логин</div>
      </div>

      <div class="field">
        <label>Пароль</label>
        <input
          type="password"
          id="password"
          placeholder="Ваш пароль"
          oninput="clearErr('password')"
        >
        <div class="err-msg" id="password-err">Пожалуйста, введите пароль</div>
      </div>

      <div class="actions">
        <button class="btn-submit" onclick="submitForm()">Войти →</button>

        <div class="switch-link">
          Нет аккаунта? <a href="/register">Регистрация</a>
        </div>
      </div>
    </div>

    <div class="success" id="success-view">
      <div class="success-icon">👋</div>
      <h2>С возвращением!</h2>
      <p id="success-text"></p>
      <button class="btn-again" onclick="resetForm()">Вернуться на главную</button>
    </div>

  </div>
</div>

<script>
function clearErr(id) {
    document.getElementById(id).classList.remove('err');
    document.getElementById(id + '-err').style.display = 'none';
}

function showErr(id) {
    document.getElementById(id).classList.add('err');
    document.getElementById(id + '-err').style.display = 'block';
}

async function submitForm() {
    const login = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value.trim();
    let isValid = true;

    if (!login) { showErr('login'); isValid = false; }
    if (!password) { showErr('password'); isValid = false; }

    if (!isValid) return;

    try {
        const res = await fetch('http://localhost:8000/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login: login, password: password })
    });

    const data = await res.json();
        if (!res.ok) {
            alert('Ошибка: ' + (data.detail || 'Неверный логин или пароль'));
            return;
        }

      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-text').textContent = 'Вы успешно вошли как «' + login + '».';
      document.getElementById('success-view').style.display = 'block';

    } catch (e) {
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-text').textContent = 'Вы успешно вошли как «' + login + '».';
      document.getElementById('success-view').style.display = 'block';
      console.log('Сервер недоступен, показан тестовый экран успеха.');
    }
  }

function resetForm() {
    document.getElementById('login').value = '';
    document.getElementById('password').value = '';
    document.getElementById('success-view').style.display = 'none';
    document.getElementById('form-view').style.display = 'block';
}
</script>

</body>
</html>

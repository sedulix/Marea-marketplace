<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marea — Личный кабинет</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style/account_page.css">
<script src="/static/script/account_page.js" defer></script>


</head>
<body>

<nav>
  <div class="nav-wrap">
    <a href="/" class="logo">Mare<span class="dot">a</span></a>

    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="http://127.0.0.1:8000/catalog">Каталог</a>
      <a href="http://127.0.0.1:8000/actions">Акции</a>
      <a href="http://127.0.0.1:8000/sell">Продавать</a>
      <a href="#" class="profile-badge">АИ</a>
    </div>

  </div>
</nav>

<div class="account-page">
  <aside class="sidebar">
    <div class="user-card">

      <div class="user-avatar-wrapper">
        <label for="avatar-upload" class="user-avatar">
          <span id="avatar-text">АИ</span>
          <img id="avatar-img" src="" alt="Avatar" style="display: none;">

          <div class="avatar-overlay">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
          </div>

        </label>
        <input type="file" id="avatar-upload" accept="image/*" hidden onchange="loadAvatar(event)">
      </div>

      <div class="user-info">
        <h3 id="profile-username"></h3>
        <p id="profile-email"></p>
      </div>
    </div>

    <nav class="menu">
      <a href="#" class="menu-item active">👤 Личные данные</a>
      <a href="#" class="menu-item">📦 Мои заказы</a>
      <a href="#" class="menu-item">❤️ Избранное</a>
      <a href="#" class="menu-item">🏷️ Мои товары</a>
      <a href="#" class="menu-item danger" onclick="logout()">🚪 Выйти</a>
    </nav>
  </aside>

  <main class="content-box">

    <div class="content-header">
      <h1>Личные данные</h1>
      <p class="subtitle">Управляйте своей контактной информацией и настройками профиля</p>
    </div>

    <div class="form-grid">

      <div class="field full">
        <label>Email</label>
        <input type="email" value="alex@example.com" placeholder="Укажите почту">
      </div>

      <div class="field">
        <label>Телефон</label>
        <input type="tel" placeholder="+7 (___) ___-__-__">
      </div>

      <div class="field">
        <label>Город</label>
        <input type="text" value="Москва" placeholder="Ваш город">
      </div>

    </div>

    <div class="actions">
      <button class="btn-submit" onclick="saveData(this)">Сохранить изменения</button>
    </div>

  </main>
</div>

<div class="toast" id="toastMsg">✅ Настройки успешно сохранены</div>


</body>
</html>

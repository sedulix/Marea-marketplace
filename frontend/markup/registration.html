<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marea — Регистрация</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style/registration.css">
<script src="/static/script/registration.js" defer></script>


</head>
<body>

<nav>
  <div class="nav-wrap">
    <a href="/" class="logo">Mare<span class="dot">a</span></a>

    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="http://127.0.0.1:8000/catalog">Каталог</a>
      <a href="http://127.0.0.1:8000/actions">Акции</a>
      <a href="http://127.0.0.1:8000/delivery">Доставка</a>
      <a href="#" class="active">Регистрация</a>
    </div>

  </div>
</nav>

<div class="page">
  <div class="form-box">

    <div id="form-view">
      <h1>Регистрация</h1>
      <p class="subtitle">Придумайте логин, укажите почту и пароль для создания аккаунта</p>

      <div class="field">
        <label>Логин</label>

        <input
          type="text"
          id="login"
          placeholder="Например: yourName_cool"
          oninput="clearErr('login')"
        >
        <div class="err-msg" id="login-err">Пожалуйста, введите логин</div>
      </div>

      <div class="field">
        <label>Email</label>

        <input
          type="email"
          id="email"
          placeholder="Например: yourName@example.com"
          oninput="clearErr('email')"
        >
        <div class="err-msg" id="email-err">Пожалуйста, введите email</div>
      </div>

      <div class="field">
        <label>Пароль</label>

        <input
          type="password"
          id="password"
          placeholder="Придумайте надежный пароль"
          oninput="clearErr('password')"
        >
        <div class="err-msg" id="password-err">Пожалуйста, введите пароль</div>
      </div>

      <div class="actions">
        <button class="btn-submit" onclick="submitForm()">Зарегистрироваться →</button>

        <div class="switch-link">
          Уже есть аккаунт? <a href="/login">Вход</a>
        </div>

      </div>
    </div>

    <div class="success" id="success-view">
      <div class="success-icon">✨</div>
      <h2>Добро пожаловать!</h2>
      <p id="success-text"></p>
      <button class="btn-again" onclick="window.location.href='/'">Вернуться на главную</button>
    </div>

  </div>
</div>


</body>
</html>

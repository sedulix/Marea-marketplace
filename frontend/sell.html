<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marea — Добавить товар</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F6F3EE;
    --white: #FFFFFF;
    --dark: #18160F;
    --muted: #8A867C;
    --accent: #C05C35;
    --accent-hover: #A84A26;
    --accent-soft: #F2E5DE;
    --border: #E3DDD5;
    --chip-bg: #EEEBE5;
    --red: #D03A3A;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  nav {
    background: rgba(246,243,238,.93);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .nav-wrap {
    max-width: 1280px; margin: 0 auto; padding: 0 40px;
    height: 66px; display: flex; align-items: center; gap: 28px;
  }
  .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--dark); text-decoration: none; }
  .logo .dot { color: var(--accent); }
  .nav-links { display: flex; gap: 22px; margin-left: auto; }
  .nav-links a { font-size: 14px; color: var(--muted); text-decoration: none; transition: color .2s; }
  .nav-links a:hover { color: var(--dark); }
  .nav-links a.active { color: var(--dark); font-weight: 500; }

  .page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .form-box {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 44px 48px;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 8px 40px rgba(0,0,0,.06);
    animation: fadeUp .4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.6;
  }

  .field { margin-bottom: 20px; }

  .field label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 7px;
  }

  .field label .counter {
    font-weight: 400;
    color: var(--muted);
    font-size: 12px;
  }

  .field input,
  .field textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    background: var(--bg);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: inherit;
    font-size: 14px;
    color: var(--dark);
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .2s;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: var(--accent);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(192,92,53,.08);
  }

  .field input::placeholder,
  .field textarea::placeholder { color: var(--muted); }

  .field textarea {
    resize: none;
    height: 130px;
    line-height: 1.65;
  }

  .field input.err,
  .field textarea.err { border-color: var(--red); }

  .err-msg {
    font-size: 12px;
    color: var(--red);
    margin-top: 5px;
    display: none;
  }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
  }

  .btn-cancel {
    background: var(--chip-bg);
    color: var(--dark);
    border: none;
    border-radius: 12px;
    padding: 13px 22px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-cancel:hover { background: var(--border); }

  .btn-submit {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-submit:hover { background: var(--accent-hover); }

  /* SUCCESS */
  .success {
    text-align: center;
    display: none;
    animation: fadeUp .4s ease both;
  }
  .success-icon { font-size: 60px; margin-bottom: 18px; }
  .success h2 { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 500; margin-bottom: 8px; }
  .success p { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .btn-again {
    background: var(--accent-soft);
    color: var(--accent);
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-again:hover { background: #e8d5cc; }
</style>
</head>
<body>

<nav>
  <div class="nav-wrap">
    <a href="/" class="logo">Mare<span class="dot">a</span></a>
    <div class="nav-links">
      <a href="/">Главная</a>
      <a href="">Каталог</a>
      <a href="#">Акции</a>
      <a href="#">Доставка</a>
      <a href="#" class="active">Продавать</a>
    </div>
  </div>
</nav>

<div class="page">
  <div class="form-box">

    <div id="form-view">
      <h1>Добавить товар</h1>
      <p class="subtitle">Заполните название и описание — мы опубликуем товар в каталоге</p>

      <div class="field">
        <label>
          Название
          <span class="counter" id="name-count">0 / 100</span>
        </label>
        <input
          type="text"
          id="name"
          maxlength="100"
          placeholder="Например: Беспроводные наушники Pro"
          oninput="count('name','name-count',100); clear('name')"
        >
        <div class="err-msg" id="name-err">Введите название товара</div>
      </div>

      <div class="field">
        <label>
          Описание
          <span class="counter" id="desc-count">0 / 500</span>
        </label>
        <textarea
          id="desc"
          maxlength="500"
          placeholder="Расскажите о товаре: материал, размеры, особенности..."
          oninput="count('desc','desc-count',500); clear('desc')"
        ></textarea>
        <div class="err-msg" id="desc-err">Добавьте описание товара</div>
      </div>

      <div class="actions">
        <button class="btn-cancel">Отмена</button>
        <button class="btn-submit" onclick="submit()">Добавить товар →</button>
      </div>
    </div>

    <div class="success" id="success-view">
      <div class="success-icon">🎉</div>
      <h2>Товар добавлен!</h2>
      <p id="success-text"></p>
      <button class="btn-again" onclick="reset()">Добавить ещё один</button>
    </div>

  </div>
</div>

<script>
  function count(id, countId, max) {
    const len = document.getElementById(id).value.length;
    document.getElementById(countId).textContent = len + ' / ' + max;
  }

  function clear(id) {
    document.getElementById(id).classList.remove('err');
    document.getElementById(id + '-err').style.display = 'none';
  }

  function showErr(id) {
    document.getElementById(id).classList.add('err');
    document.getElementById(id + '-err').style.display = 'block';
  }

  async function submit() {
    const name = document.getElementById('name').value.trim();
    const desc = document.getElementById('desc').value.trim();
    let ok = true;
    if (!name) { showErr('name'); ok = false; }
    if (!desc)  { showErr('desc');  ok = false; }
    if (!ok) return;

    try {
      const res = await fetch('http://localhost:8000/sell', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name, description: desc })
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById('form-view').style.display = 'none';
        document.getElementById('success-text').textContent = '«' + data.name + '» добавлен в каталог';
        document.getElementById('success-view').style.display = 'block';
      } else {
        alert('Ошибка: ' + data.detail);
      }

    } catch (e) {
      alert('Сервер недоступен. Запущен ли uvicorn?');
    }
  }

  function reset() {
    document.getElementById('name').value = '';
    document.getElementById('desc').value = '';
    document.getElementById('name-count').textContent = '0 / 100';
    document.getElementById('desc-count').textContent = '0 / 500';
    document.getElementById('success-view').style.display = 'none';
    document.getElementById('form-view').style.display = 'block';
  }
</script>

</body>
</html>
